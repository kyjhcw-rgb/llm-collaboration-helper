server:
  port: ${BACKEND_PORT}

spring:
  application:
    name: collaboration-helper

  # 1. DB 설정 (환경변수 사용)
  datasource:
    url: ${DB_INTERNAL}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  # 2. JPA 설정
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # 3. 파일 업로드 설정 (기획서 PDF 등)
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME} # 구글 이메일 주소
    password: ${MAIL_PASSWORD} # 구글 계정 '앱 비밀번호'
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true


# 리액트 & 파이썬 서버 연동 설정
app:
  # CORS 설정 (리액트가 접속할 주소)
  cors:
    allowed-origins: ${ALLOWED_ORIGINS}

  # AI 서버 설정 (파이썬 서버 주소)
  ai-server:
    url: ${PYTHON_INTERNAL}
    # timeout: 5000 # 필요 시 타임아웃 설정 추가 가능

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000